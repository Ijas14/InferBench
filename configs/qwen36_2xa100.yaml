target:
  endpoint: "http://localhost:30000/v1"
  model: "Qwen/Qwen3-235B-A22B-Thinking-2507"
  api_style: "openai"
  metrics_endpoint: "http://localhost:30000/metrics"

model:
  context_window: 262144
  quantization: "none"
  kv_precision: "bf16"

hardware:
  gpu: "NVIDIA A100-SXM4-80GB"
  vram_gb: 160
  driver: "535.104.05"
  num_gpus: 2

workloads:
  - single_long
  - concurrent_uniform
  - shared_prefix
  - agent_session
  - mixed

bands: [short, medium, long, extreme]
concurrencies: [1, 8, 32, 128]
seeds: [42, 1337, 9999]
repeats: 1

quality:
  enabled: true
  eval_sets: [niah, longbench_subset]
  perplexity: true

output:
  dir: "results/"
  formats: [json, markdown]
