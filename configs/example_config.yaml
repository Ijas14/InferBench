# ==============================================================================
# InferBench - Advanced Configuration Example
# ==============================================================================
# This file demonstrates the full configuration schema available when running:
# python -m inferbench run --config configs/example_config.yaml
# ==============================================================================

# 1. Target Server Configuration
target:
  endpoint: "http://localhost:8000/v1"  # Base URL of your inference server
  model: "qwen2.5-7b"                   # The exact model ID registered in the server
  api_style: "openai_chat"              # Allowed: openai_chat, openai_completions
  metrics_endpoint: "http://localhost:8000/metrics" # Optional: Prometheus metrics endpoint

# 2. Model Properties (Metadata for the final fingerprint report)
model:
  context_window: 32768
  quantization: "none"                  # e.g., none, fp8, awq, gptq
  kv_precision: "bf16"

# 3. Hardware Properties (Metadata for the final fingerprint report)
# Inferbench attempts to auto-detect these, but you can override them here.
hardware:
  gpu: "AMD MI300X"
  vram_gb: 192
  driver: "6.1.1"

# 4. Workloads
# Define which test scenarios to run.
workloads:
  - single_long           # Tests pure context length scaling (no concurrency contention)
  - concurrent_uniform    # Tests raw concurrency (N identical requests)
  - shared_prefix         # Simulates RAG (80% shared system prompt, 20% unique user suffix)
  - mixed                 # Simulates realistic messy traffic (Poisson arrivals, mixed lengths)

# 5. Context Bands
# The lengths of the requests generated by the workloads.
bands:
  - short    # ~4k tokens
  - medium   # ~32k tokens
  - long     # ~128k tokens
  - extreme  # ~256k tokens

# 6. Concurrency Ladder
# The cliff-finder will walk up this ladder until the server breaks.
concurrencies:
  - 1
  - 8
  - 32
  - 128

# 7. Cliff Thresholds
# Define what constitutes a "break" in the system.
cliff_latency_multiplier: 10.0  # Fails if TTFT exceeds 10x the baseline (concurrency=1) TTFT
cliff_error_threshold: 0.1      # Fails if more than 10% of requests return HTTP errors

# 8. Execution Parameters
seeds:
  - 42  # Deterministic seeds for reproducible synthetic text generation
repeats: 1

# 9. Quality Tracking (NIAH - Needle In A Haystack)
quality:
  enabled: false

# 10. Output Definitions
output:
  dir: "results/"       # Where to save the fingerprint and curves
  formats:
    - json
    - markdown
